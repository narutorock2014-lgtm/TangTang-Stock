<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TangTang-Stock — Stock Management</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍜</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{
    --counter:#0D0D0D; --counter-2:#1A1A1A; --rail:#333333;
    --paper:#FFFFFF; --paper-2:#F2F2F2; --ink:#141414; --ink-soft:#6E6E6E;
    --amber:#C81E1E; --amber-ink:#FFFFFF;
    --red:#C1443D; --red-bg:#F6DCD9;
    --green:#5C8A5A; --green-bg:#DEEBDA;
    --warn-bg:#F7EAD1;
    --line: rgba(0,0,0,0.14);
    --body-bg: var(--counter);
    --body-bg-2:#000000;
    --lock-bg:#2A1414;
  }
  html[data-theme="light"]{
    --counter:#FFFFFF; --counter-2:#F2F2F2; --rail:#DADADA;
    --paper:#FFFFFF; --paper-2:#F5F5F5; --ink:#141414; --ink-soft:#6E6E6E;
    --body-bg:#FFFFFF; --body-bg-2:#F2F2F2;
    --lock-bg:#FBEAEA;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--body-bg);
    background-image: radial-gradient(circle at 15% 0%, var(--body-bg-2) 0%, var(--body-bg) 45%);
    color:var(--paper); font-family:'Noto Sans Thai','IBM Plex Mono',sans-serif;
    min-height:100vh; padding-bottom:96px; line-height:1.5;
  }
  html[data-theme="light"] body{ color:var(--ink); }
  .display{ font-family:'Kanit',sans-serif; }
  .mono{ font-family:'IBM Plex Mono',monospace; }

  header.top{ padding:16px 16px 12px; border-bottom:1px solid var(--rail); position:sticky; top:0; z-index:30; background:var(--counter); }
  .brand{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .brand-left{ display:flex; align-items:center; gap:10px; }
  .brand-logo{ font-size:26px; line-height:1; filter:drop-shadow(0 2px 4px rgba(200,30,30,0.35)); }
  .brand-text{ display:flex; flex-direction:column; gap:1px; }
  .brand h1{ font-family:'Kanit',sans-serif; font-weight:800; font-size:19px; letter-spacing:0.2px; margin:0; color:var(--paper); }
  html[data-theme="light"] .brand h1{ color:var(--ink); }
  .brand-accent{ background:linear-gradient(90deg, var(--amber), #E8895C); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand-sub{ font-family:'Noto Sans Thai',sans-serif; font-size:10.5px; color:var(--ink-soft); letter-spacing:0.2px; }
  .brand .tag{ font-size:11px; color:var(--amber); border:1px solid var(--amber); border-radius:100px; padding:2px 8px; font-family:'IBM Plex Mono',monospace; letter-spacing:0.5px; }
  .icon-btn{ border:1px solid var(--rail); background:var(--counter-2); color:var(--paper); border-radius:9px; padding:8px 10px; font-size:15px; cursor:pointer; }
  html[data-theme="light"] .icon-btn{ color:var(--ink); }
  .header-actions{ display:flex; gap:6px; flex-wrap:wrap; }

  .date-row{ margin-top:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .date-row label{ font-size:12px; color:var(--ink-soft); }
  .date-pill{ display:flex; align-items:center; gap:8px; background:var(--paper); border-radius:10px; padding:6px 10px; }
  .date-pill input[type=date]{ border:none; background:transparent; color:var(--ink); font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600; }
  .date-nav-btn{ border:none; background:transparent; color:var(--ink-soft); font-size:16px; cursor:pointer; padding:0 4px; }
  .search-wrap{ margin-top:10px; }
  .search-wrap input{ width:100%; border:1px solid var(--rail); background:var(--counter-2); color:var(--paper); border-radius:10px; padding:9px 12px; font-size:14px; font-family:'Noto Sans Thai',sans-serif; }
  html[data-theme="light"] .search-wrap input{ color:var(--ink); }
  .search-wrap input::placeholder{ color:#8b8175; }

  .sync-banner{ display:flex; align-items:center; gap:8px; font-size:11px; padding:6px 16px 0; color:var(--ink-soft); }
  .sync-dot{ width:8px; height:8px; border-radius:50%; background:#5C8A5A; display:inline-block; }
  .sync-dot.off{ background:#C1443D; }
  .sync-dot.syncing{ background:#C89A1E; }

  .tabs{ display:flex; gap:8px; overflow-x:auto; padding:12px 16px 4px; -webkit-overflow-scrolling:touch; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{ flex:0 0 auto; padding:8px 14px; border-radius:100px; border:1px solid var(--rail); background:var(--counter-2); color:#cfc7ba; font-size:13px; font-weight:600; font-family:'Kanit',sans-serif; cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:6px; }
  .tab.active{ background:var(--amber); color:var(--amber-ink); border-color:var(--amber); }
  .tab .count{ font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:0.75; }

  .summary{ display:flex; gap:8px; padding:10px 16px 4px; flex-wrap:wrap; }
  .chip{ font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; border-radius:8px; padding:5px 10px; display:flex; gap:6px; align-items:center; }
  .chip.danger{ background:var(--red-bg); color:var(--red); }
  .chip.order{ background:#FBE4E1; color:#C1443D; }
  .chip.near{ background:var(--warn-bg); color:#8A5F16; }
  .chip.ok{ background:var(--green-bg); color:var(--green); }

  main{ padding:10px 10px 20px; max-width:1200px; margin:0 auto; }

  .empty-state{ background:var(--counter-2); border:1px dashed var(--rail); border-radius:14px; padding:32px 20px; text-align:center; color:#a79d8d; margin-top:16px; }
  .empty-state .big{ font-size:32px; }
  .empty-state h3{ font-family:'Kanit',sans-serif; color:var(--paper); margin:8px 0 4px; }
  html[data-theme="light"] .empty-state h3{ color:var(--ink); }

  .home-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:16px; max-width:960px; margin:0 auto; }
  @media(min-width:640px){ .home-grid{ grid-template-columns:repeat(4,1fr); } }
  .home-tile{ background:var(--paper); border-radius:14px; padding:16px 14px; cursor:pointer; text-align:left; box-shadow:0 8px 18px -10px rgba(0,0,0,0.55); border:none; display:flex; flex-direction:column; gap:8px; transition:transform .15s, box-shadow .15s; position:relative; }
  .home-tile:hover{ transform:translateY(-4px); box-shadow:0 14px 26px -10px rgba(0,0,0,0.4); }
  .home-tile .icon{ font-size:28px; }
  .home-tile h3{ font-family:'Kanit',sans-serif; font-size:15px; font-weight:700; color:var(--ink); margin:0; }
  .home-tile .count{ font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; }
  .home-tile .mini-chips{ display:flex; gap:5px; flex-wrap:wrap; margin-top:2px; }
  .home-tile .cat-del{ position:absolute; top:8px; right:8px; border:none; background:transparent; color:#c9a; opacity:0.55; font-size:13px; cursor:pointer; }
  .home-tile .cat-del:hover{ opacity:1; }
  .mini-chip{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:700; border-radius:6px; padding:2px 6px; }
  .mini-chip.danger{ background:var(--red-bg); color:var(--red); }
  .mini-chip.order{ background:#FBE4E1; color:#C1443D; }
  .mini-chip.near{ background:var(--warn-bg); color:#8A5F16; }
  .mini-chip.ok{ background:var(--green-bg); color:var(--green); }
  .home-tile.add-tile{ align-items:center; justify-content:center; background:transparent; border:1.5px dashed var(--rail); box-shadow:none; color:#cfc7ba; }
  .home-actions-row{ display:flex; gap:10px; flex-wrap:wrap; padding:6px 16px 4px; max-width:960px; margin:0 auto; }
  .action-card{ flex:1; min-width:150px; background:var(--counter-2); border:1px solid var(--rail); border-radius:12px; padding:12px 14px; color:var(--paper); cursor:pointer; font-family:'Kanit',sans-serif; font-weight:600; font-size:13px; text-align:left; }
  html[data-theme="light"] .action-card{ color:var(--ink); }
  .action-card .sub{ display:block; font-family:'Noto Sans Thai',sans-serif; font-weight:400; font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .hero-btn{ margin:16px; max-width:960px; width:calc(100% - 32px); margin-left:auto; margin-right:auto; display:block; background:linear-gradient(135deg, var(--amber), #A81212); color:var(--amber-ink); border:none; border-radius:14px; padding:17px; font-family:'Kanit',sans-serif; font-weight:800; font-size:16px; cursor:pointer; box-shadow:0 12px 26px -10px rgba(200,30,30,0.5); transition:transform .12s, box-shadow .12s; letter-spacing:0.2px; }
  .hero-btn:hover{ transform:translateY(-1px); box-shadow:0 16px 30px -10px rgba(200,30,30,0.6); }
  .hero-btn:active{ transform:translateY(0); }

  .category-header{ display:flex; align-items:center; gap:10px; padding:14px 16px 4px; max-width:1200px; margin:0 auto; flex-wrap:wrap; }
  .back-btn{ border:1px solid var(--rail); background:var(--counter-2); color:var(--paper); border-radius:9px; padding:8px 12px; font-family:'Kanit',sans-serif; font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap; }
  html[data-theme="light"] .back-btn{ color:var(--ink); }
  .category-header h2{ font-family:'Kanit',sans-serif; color:var(--paper); font-size:18px; margin:0; }
  html[data-theme="light"] .category-header h2{ color:var(--ink); }

  .section-block{ margin-bottom:22px; }
  .section-title{ font-family:'Kanit',sans-serif; font-size:15px; font-weight:700; color:var(--amber); padding:10px 6px 6px; display:flex; align-items:center; gap:8px; }

  .lock-banner{ display:flex; align-items:center; gap:10px; background:var(--lock-bg); border:1px solid var(--amber); border-radius:10px; padding:10px 14px; margin:10px 6px; max-width:1200px; }
  .lock-banner span{ font-size:13px; color:var(--paper); flex:1; font-family:'Kanit',sans-serif; }
  html[data-theme="light"] .lock-banner span{ color:var(--ink); }
  .lock-banner button{ background:var(--amber); color:var(--amber-ink); border:none; border-radius:8px; padding:8px 14px; font-family:'Kanit',sans-serif; font-weight:700; font-size:12.5px; cursor:pointer; white-space:nowrap; }

  .alert-banner{ background:var(--red-bg); border:1.5px solid var(--red); border-radius:10px; padding:12px 14px; margin:10px 6px; max-width:1200px; }
  .alert-banner .alert-head{ font-family:'Kanit',sans-serif; font-weight:700; font-size:13.5px; color:var(--red); display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .alert-banner .alert-list{ font-family:'Noto Sans Thai',sans-serif; font-size:12.5px; color:#7A2E2A; line-height:1.7; }
  .alert-banner .alert-list b{ font-weight:700; }

  .home-tile{ border-top:4px solid transparent; }
  .home-tile.status-danger{ border-top-color:var(--red); }
  .home-tile.status-order{ border-top-color:#C1443D; }
  .home-tile.status-near{ border-top-color:#C89A1E; }
  .home-tile.status-ok{ border-top-color:var(--green); }

  .status-badge{ font-family:'Kanit',sans-serif; font-size:12.5px; font-weight:700; padding:6px 10px; border-radius:7px; white-space:nowrap; display:inline-block; border:1.5px solid transparent; letter-spacing:0.2px; }
  .status-badge.danger{ border-color:var(--red); }
  .status-badge.order{ border-color:#C1443D; }
  .status-badge.near{ border-color:#C89A1E; }
  .status-badge.ok{ border-color:var(--green); }
  .status-badge.danger{ background:var(--red-bg); color:var(--red); }
  .status-badge.order{ background:#FBE4E1; color:#C1443D; }
  .status-badge.near{ background:var(--warn-bg); color:#8A5F16; }
  .status-badge.ok{ background:var(--green-bg); color:var(--green); }
  .table-wrap{ background:var(--paper); border-radius:10px; overflow:auto; max-width:100%; box-shadow: 0 8px 18px -10px rgba(0,0,0,0.55); }
  table.stock-table{ border-collapse:collapse; width:100%; min-width:980px; font-family:'Noto Sans Thai',sans-serif; }
  table.stock-table thead th{ position:sticky; top:0; background:var(--ink); color:var(--paper); z-index:2; font-family:'Kanit',sans-serif; font-weight:600; font-size:12px; padding:9px 6px; text-align:center; white-space:nowrap; border-right:1px solid rgba(255,255,255,0.08); }
  table.stock-table thead tr.group-row th{ background:#332C24; font-size:10.5px; color:#D9CDBB; font-weight:500; }
  table.stock-table th.col-item, table.stock-table td.col-item{ text-align:left; position:sticky; left:0; z-index:1; background:var(--paper); box-shadow: 2px 0 4px -2px rgba(0,0,0,0.25); }
  table.stock-table thead th.col-item{ background:var(--ink); z-index:3; }
  table.stock-table tbody td{ padding:10px 6px; text-align:center; font-size:13.5px; color:var(--ink); border-bottom:1px solid var(--line); white-space:nowrap; }
  table.stock-table tbody tr:hover td{ background:#FBF3E2; }
  table.stock-table tbody tr:hover td.col-item{ background:#FBF3E2; }
  table.stock-table tbody td{ font-variant-numeric:tabular-nums; }
  table.stock-table tbody tr.row-danger td{ background:#FCEAE9; }
  table.stock-table tbody tr.row-danger:hover td{ background:#FADAD8; }
  table.stock-table tbody tr.row-danger td.col-item{ background:#FCEAE9; border-left:5px solid var(--red); }
  table.stock-table tbody tr.row-danger:hover td.col-item{ background:#FADAD8; }
  table.stock-table tbody tr.row-order td{ background:#FDF0E9; }
  table.stock-table tbody tr.row-order:hover td{ background:#FBE2D5; }
  table.stock-table tbody tr.row-order td.col-item{ background:#FDF0E9; border-left:5px solid #C1443D; }
  table.stock-table tbody tr.row-order:hover td.col-item{ background:#FBE2D5; }
  table.stock-table tbody tr.row-near td.col-item{ border-left:5px solid #C89A1E; }
  table.stock-table tbody tr.row-ok td.col-item{ border-left:5px solid transparent; }
  table.stock-table td.col-idx{ color:var(--ink-soft); font-family:'IBM Plex Mono',monospace; font-size:12px; }
  table.stock-table td.col-item .name{ font-weight:600; font-size:13.5px; }
  table.stock-table td.col-green{ background:#EAF3E7; font-family:'IBM Plex Mono',monospace; font-weight:600; }
  table.stock-table td.col-used{ background:#FDEFE3; font-family:'IBM Plex Mono',monospace; font-weight:700; color:#B5590B; }
  table.stock-table td.col-green input, table.stock-table td.col-input input, table.stock-table td.col-carry input{
    width:60px; border:1.5px solid #B9D0B4; background:#F3F9F1; border-radius:6px; padding:8px 5px;
    font-family:'IBM Plex Mono',monospace; font-size:14.5px; font-weight:700; color:var(--ink); text-align:center; min-height:36px;
  }
  table.stock-table td.col-carry input{ border-color:#DDDDDD; background:#FAFAFA; }
  table.stock-table td.col-input input{ border-color:#E8B4B4; background:#FDEEEE; }
  table.stock-table td input:disabled{ background:#EFEFEF; color:#9A9A9A; border-color:#DDDDDD; cursor:not-allowed; }
  table.stock-table td input:focus{ outline:2px solid var(--amber); background:#FDEAEA; }
  table.stock-table td.col-unit input{ width:56px; border:1px solid #DCD3BE; background:#fff; border-radius:5px; padding:5px 4px; font-family:'Noto Sans Thai',sans-serif; font-size:11.5px; color:var(--ink-soft); text-align:center; }
  table.stock-table td.col-note input{ width:110px; border:1px solid #DCD3BE; background:#fff; border-radius:5px; padding:6px 6px; font-family:'Noto Sans Thai',sans-serif; font-size:12.5px; color:var(--ink); text-align:left; }
  table.stock-table td.col-total{ font-family:'IBM Plex Mono',monospace; font-weight:600; }
  table.stock-table td.col-rem{ font-family:'IBM Plex Mono',monospace; font-weight:700; background:#F1EAD8; }
  table.stock-table td.col-actions{ white-space:nowrap; }
  .row-btn{ border:none; background:transparent; cursor:pointer; font-size:15px; padding:4px 5px; border-radius:5px; vertical-align:middle; }
  .row-btn:hover{ background:var(--paper-2); }
  .unsaved-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--amber); margin-left:4px; vertical-align:middle; }

  .add-item-btn{ width:100%; padding:14px; border-radius:10px; border:1.5px dashed var(--rail); background:transparent; color:#cfc7ba; font-family:'Kanit',sans-serif; font-weight:600; font-size:14px; cursor:pointer; margin-top:6px; }
  .add-item-btn:hover{ border-color:var(--amber); color:var(--amber); }

  .chart-card{ background:var(--paper); border-radius:12px; padding:14px; margin-top:12px; box-shadow:0 8px 18px -10px rgba(0,0,0,0.55); }
  .chart-card h4{ font-family:'Kanit',sans-serif; color:var(--ink); margin:0 0 10px; font-size:14px; }
  .chart-card canvas{ max-height:280px; }

  .bottom-bar{ position:fixed; bottom:0; left:0; right:0; background:var(--counter-2); border-top:1px solid var(--rail); padding:10px 16px; display:flex; gap:10px; z-index:30; flex-wrap:wrap; }
  .bottom-bar .btn-primary{ flex:1; min-width:140px; background:var(--amber); color:var(--amber-ink); padding:12px; border-radius:10px; font-family:'Kanit',sans-serif; font-weight:700; font-size:14px; border:none; cursor:pointer; }
  .bottom-bar .btn-secondary{ background:transparent; color:var(--paper); border:1px solid var(--rail); padding:12px 14px; border-radius:10px; font-family:'Kanit',sans-serif; font-weight:600; font-size:14px; cursor:pointer; }
  html[data-theme="light"] .bottom-bar .btn-secondary{ color:var(--ink); }

  .modal-overlay{ position:fixed; inset:0; background:rgba(20,18,16,0.7); display:flex; align-items:flex-end; justify-content:center; z-index:100; padding:0; }
  @media(min-width:480px){ .modal-overlay{ align-items:center; padding:16px; } }
  .modal{ background:var(--paper); width:100%; max-width:520px; border-radius:16px 16px 0 0; padding:20px 18px 24px; max-height:88vh; overflow-y:auto; }
  @media(min-width:480px){ .modal{ border-radius:16px; } }
  .modal h2{ font-family:'Kanit',sans-serif; color:var(--ink); margin:0 0 14px; font-size:18px; }
  .modal .field{ margin-bottom:12px; }
  .modal .field label{ font-size:12px; color:var(--ink-soft); margin-bottom:4px; display:block; font-weight:600; }
  .modal .field input, .modal .field select{ width:100%; border:1px solid #DCD3BE; background:#fff; border-radius:8px; padding:10px; font-size:14px; color:var(--ink); font-family:'Noto Sans Thai',sans-serif; }
  .modal .radio-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .modal .radio-row label{ flex:1; min-width:90px; border:1px solid #DCD3BE; border-radius:8px; padding:9px; text-align:center; font-size:12.5px; color:var(--ink); cursor:pointer; font-weight:600; }
  .modal .radio-row input{ display:none; }
  .modal .radio-row input:checked + span{ color:var(--amber-ink); }
  .modal .radio-row label:has(input:checked){ background:var(--amber); border-color:var(--amber); }
  .modal-actions{ display:flex; gap:10px; margin-top:16px; }
  .modal-actions .btn-cancel{ flex:1; background:var(--paper-2); color:var(--ink); padding:11px; border-radius:9px; border:none; font-family:'Kanit',sans-serif; font-weight:600; cursor:pointer; }
  .modal-actions .btn-confirm{ flex:1; background:var(--ink); color:var(--paper); padding:11px; border-radius:9px; border:none; font-family:'Kanit',sans-serif; font-weight:600; cursor:pointer; }
  .modal-actions .btn-confirm.danger{ background:var(--red); color:#fff; }
  .modal .note-txt{ font-size:12.5px; color:var(--ink-soft); line-height:1.5; }

  .toast{ position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); padding:10px 18px; border-radius:100px; font-family:'Kanit',sans-serif; font-size:13px; z-index:200; opacity:0; pointer-events:none; transition:opacity 0.25s, top 0.25s; max-width:90vw; text-align:center; }
  .toast.show{ opacity:1; top:20px; }

  ::-webkit-scrollbar{ width:6px; height:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--rail); border-radius:10px; }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="brand-left">
      <div class="brand-logo">🍜</div>
      <div class="brand-text">
        <h1>TangTang<span class="brand-accent">-Stock</span></h1>
        <span class="brand-sub">ระบบจัดการสต็อกวัตถุดิบ</span>
      </div>
      <span class="tag">LIVE</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="สลับโหมดมืด/สว่าง">🌓</button>
      <button class="icon-btn" id="backupBtn" title="สำรอง/กู้คืนข้อมูล">🗂</button>
      <button class="icon-btn" id="homeBtn" title="หน้าแรก">🏠</button>
      <button class="icon-btn" id="logoutBtn" title="ออกจากระบบ" style="display:none;">🚪</button>
    </div>
  </div>

<script>
/* =======================================================================
   INDEXEDDB LAYER
======================================================================= */
const DB_NAME = 'StockManagementDB';
const DB_VERSION = 1;
let DB = null;

function idbOpen(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains('categories')) db.createObjectStore('categories', {keyPath:'id'});
      if(!db.objectStoreNames.contains('items')) db.createObjectStore('items', {keyPath:'id'});
      if(!db.objectStoreNames.contains('entries')){
        const es = db.createObjectStore('entries', {keyPath:'key'});
        es.createIndex('byDate', 'date', {unique:false});
        es.createIndex('byItem', 'itemId', {unique:false});
      }
      if(!db.objectStoreNames.contains('meta')) db.createObjectStore('meta', {keyPath:'key'});
    };
    req.onsuccess = (e)=>{ resolve(e.target.result); };
    req.onerror = (e)=>{ reject(e.target.error); };
  });
}
function idbTx(store, mode){
  return DB.transaction(store, mode).objectStore(store);
}
function idbGetAll(store){
  return new Promise((resolve,reject)=>{
    const req = idbTx(store,'readonly').getAll();
    req.onsuccess = ()=>resolve(req.result||[]);
    req.onerror = ()=>reject(req.error);
  });
}
function idbGet(store, key){
  return new Promise((resolve,reject)=>{
    const req = idbTx(store,'readonly').get(key);
    req.onsuccess = ()=>resolve(req.result||null);
    req.onerror = ()=>reject(req.error);
  });
}
function idbPut(store, obj){
  return new Promise((resolve,reject)=>{
    const req = idbTx(store,'readwrite').put(obj);
    req.onsuccess = ()=>resolve(obj);
    req.onerror = ()=>reject(req.error);
  });
}
function idbDelete(store, key){
  return new Promise((resolve,reject)=>{
    const req = idbTx(store,'readwrite').delete(key);
    req.onsuccess = ()=>resolve(true);
    req.onerror = ()=>reject(req.error);
  });
}
function idbClear(store){
  return new Promise((resolve,reject)=>{
    const req = idbTx(store,'readwrite').clear();
    req.onsuccess = ()=>resolve(true);
    req.onerror = ()=>reject(req.error);
  });
}
function idbGetByIndex(store, indexName, value){
  return new Promise((resolve,reject)=>{
    const idx = idbTx(store,'readonly').index(indexName);
    const req = idx.getAll(value);
    req.onsuccess = ()=>resolve(req.result||[]);
    req.onerror = ()=>reject(req.error);
  });
}

/* =======================================================================
   CLOUD SYNC LAYER (Firebase Firestore — optional, real-time cross-device)
   ---------------------------------------------------------------------
   To enable real-time sync across devices (e.g. เครื่อง A แก้ไข เครื่อง B
   เห็นทันที) fill in FIREBASE_CONFIG below with your own Firebase project
   config (free "Spark" plan is enough). Steps are in README.md.
   If FIREBASE_CONFIG.apiKey is left as 'YOUR_API_KEY', the app runs in
   local-only (IndexedDB) mode exactly like before — nothing breaks.
======================================================================= */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC2prEp6QrHtaRqyvZlqDIUNPlGjsBhhWs",
  authDomain: "tangtang-store.firebaseapp.com",
  projectId: "tangtang-store",
  storageBucket: "tangtang-store.firebasestorage.app",
  messagingSenderId: "824092325711",
  appId: "1:824092325711:web:f11e0993441f8e7293f73a"
};
// ต้องตรงกับที่กรอกใน Firestore Security Rules ถ้าต้องการแยกข้อมูลหลายร้าน
const SHOP_ID = "default-shop";
// อีเมลภายใน (ผู้ใช้ไม่เห็น) ผูกกับรหัสผ่านร้านเดียว — ต้องสร้างผู้ใช้นี้ใน
// Firebase Console → Authentication → Users ให้ตรงกับอีเมลนี้เป๊ะๆ (ดู README ข้อ 3)
const AUTH_EMAIL = SHOP_ID + '@stock-app.local';

let CLOUD_ENABLED = false;
let fdb = null;
let fauth = null;
let unsubItems=null, unsubCats=null, unsubEntries=null;
let SUPPRESS_ECHO = false; // avoid re-render storms while writing locally
let firestoreListenersStarted = false;

async function initCloudSync(){
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY'){
    setSyncStatus('off', 'โหมดออฟไลน์ (เก็บในเครื่องนี้เท่านั้น)');
    return false;
  }
  try{
    const appMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const fsMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const authMod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
    const app = appMod.initializeApp(FIREBASE_CONFIG);
    fdb = fsMod.getFirestore(app);
    fauth = authMod.getAuth(app);
    window.__fs = fsMod;
    window.__auth = authMod;
    CLOUD_ENABLED = true;
    setSyncStatus('syncing', 'กำลังเชื่อมต่อ...');

    authMod.onAuthStateChanged(fauth, async (user)=>{
      const logoutBtn = document.getElementById('logoutBtn');
      if(user){
        hideLoginOverlay();
        if(logoutBtn) logoutBtn.style.display = '';
        if(!firestoreListenersStarted){
          firestoreListenersStarted = true;
          await startFirestoreListeners(fsMod);
        }
      } else {
        if(logoutBtn) logoutBtn.style.display = 'none';
        setSyncStatus('off', 'ต้องเข้าสู่ระบบก่อนใช้งาน');
        showLoginOverlay();
      }
    });
    return true;
  }catch(err){
    console.error('Cloud sync init failed', err);
    setSyncStatus('off', 'เชื่อมต่อคลาวด์ไม่สำเร็จ — ใช้โหมดออฟไลน์');
    CLOUD_ENABLED = false;
    return false;
  }
}

async function startFirestoreListeners(fsMod){
  const catsCol = fsMod.collection(fdb, 'shops', SHOP_ID, 'categories');
  const itemsCol = fsMod.collection(fdb, 'shops', SHOP_ID, 'items');
  const entriesCol = fsMod.collection(fdb, 'shops', SHOP_ID, 'entries');

  try{
    // One-time push of local data if cloud is empty (first run migration)
    const existingCats = await fsMod.getDocs(catsCol);
    if(existingCats.empty){
      for(const c of CATEGORIES) await fsMod.setDoc(fsMod.doc(catsCol, c.id), c);
      for(const it of ITEMS) await fsMod.setDoc(fsMod.doc(itemsCol, it.id), it);
      const localEntries = await idbGetAll('entries');
      for(const e of localEntries) await fsMod.setDoc(fsMod.doc(entriesCol, e.key), e);
    }
  }catch(err){ console.error('Initial migration push failed:', err); }

  unsubCats = fsMod.onSnapshot(catsCol, async (snap)=>{
    const arr = [];
    snap.forEach(d=> arr.push(d.data()));
    arr.sort((a,b)=>(a.order||0)-(b.order||0));
    CATEGORIES = arr;
    for(const c of arr) await idbPut('categories', c);
    if(!SUPPRESS_ECHO){ setSyncStatus('on','ซิงก์แบบเรียลไทม์ — เชื่อมต่อแล้ว'); render(); }
  });
  unsubItems = fsMod.onSnapshot(itemsCol, async (snap)=>{
    const arr = [];
    snap.forEach(d=> arr.push(d.data()));
    ITEMS = arr;
    for(const it of arr) await idbPut('items', it);
    if(!SUPPRESS_ECHO){ setSyncStatus('on','ซิงก์แบบเรียลไทม์ — เชื่อมต่อแล้ว'); render(); }
  });
  unsubEntries = fsMod.onSnapshot(entriesCol, async (snap)=>{
    snap.docChanges().forEach(async (chg)=>{
      const e = chg.doc.data();
      await idbPut('entries', e);
      if(!entryCache[e.date]) entryCache[e.date] = {};
      entryCache[e.date][e.itemId] = e;
      ENTRY_DATE_SET.add(e.date);
    });
    if(!SUPPRESS_ECHO){
      const hasUnsavedEdits = Object.values(ENTRIES).some(e=>e.saved===false);
      if(hasUnsavedEdits && APP_VIEW!=='home'){
        setSyncStatus('on','มีข้อมูลใหม่จากเครื่องอื่น — บันทึกงานที่ค้างอยู่แล้วจะอัปเดตให้');
      } else {
        await loadWorkingEntries();
        setSyncStatus('on','ซิงก์แบบเรียลไทม์ — เชื่อมต่อแล้ว');
        render();
      }
    }
  });

  setSyncStatus('on','ซิงก์แบบเรียลไทม์ — เชื่อมต่อแล้ว');
}

  if(!CLOUD_ENABLED) return;

    const fsMod = window.__fs;

    await fsMod.deleteDoc(fsMod.doc(fdb,'shops',SHOP_ID,'items',id));

async function cloudPutEntry(entry){
  if(!CLOUD_ENABLED) return;
  try{
    const fsMod = window.__fs;
    await fsMod.setDoc(fsMod.doc(fdb,'shops',SHOP_ID,'entries',entry.key), entry);
  }catch(err){ handleCloudWriteError(err); }

let _cloudErrToastShown = false;
function handleCloudWriteError(err){
  console.error('Cloud sync write failed:', err);
  setSyncStatus('off', 'บันทึกในเครื่องสำเร็จ แต่ซิงก์คลาวด์ไม่ได้ (ตรวจสอบ Firestore Rules — อาจหมดอายุ)');
  if(!_cloudErrToastShown){
    _cloudErrToastShown = true;
    showToast('⚠️ บันทึกในเครื่องนี้แล้ว แต่ซิงก์กับเครื่องอื่นไม่สำเร็จ — เช็ค Firestore Rules');
    setTimeout(()=>{ _cloudErrToastShown = false; }, 8000);
  }
}

function todayStr(){
  const d = new Date();
  const tz = d.getTimezoneOffset()*60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function addDays(dateStr, n){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+n);
  const tz = d.getTimezoneOffset()*60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 1900);
}
window.addEventListener('error', (ev)=>{
  console.error('Uncaught error:', ev.error || ev.message);
  showToast('❌ เกิดข้อผิดพลาด: ' + (ev.message || 'unknown'));
});
window.addEventListener('unhandledrejection', (ev)=>{
  console.error('Unhandled promise rejection:', ev.reason);
  const msg = (ev.reason && ev.reason.message) ? ev.reason.message : String(ev.reason);
  showToast('❌ เกิดข้อผิดพลาด: ' + msg);
});

async function loadAllCategories(){
  let cats = await idbGetAll('categories');
  if(cats.length===0){
    for(const c of DEFAULT_CATEGORIES) await idbPut('categories', c);
    cats = DEFAULT_CATEGORIES.slice();
  }
  cats.sort((a,b)=>(a.order||0)-(b.order||0));
  CATEGORIES = cats;
}
async function loadAllItems(){
  let items = await idbGetAll('items');
  if(items.length===0){
    items = seedItems();
    for(const it of items) await idbPut('items', it);
  }
  ITEMS = items;
}
async function persistItem(item){ await idbPut('items', item); await cloudPutItem(item); }
async function persistCategory(cat){ await idbPut('categories', cat); await cloudPutCategory(cat); }

async function loadEntriesForDate(date){
  if(entryCache[date]) return entryCache[date];
  const rows = await idbGetByIndex('entries','byDate', date);
  const obj = {};
  rows.forEach(r=> obj[r.itemId] = r);
  entryCache[date] = obj;
  ENTRY_DATE_SET.add(date);
  return obj;
}
async function loadAllEntryDates(){
  const rows = await idbGetAll('entries');
  ENTRY_DATE_SET = new Set(rows.map(r=>r.date));
  return Array.from(ENTRY_DATE_SET).sort();
}
async function findCarryOver(itemId, date){
  const allDates = Array.from(ENTRY_DATE_SET).filter(d=>d<date).sort().reverse();
  for(const d of allDates){
    const obj = await loadEntriesForDate(d);
    if(obj[itemId] && typeof obj[itemId].remaining==='number') return obj[itemId].remaining;
  }
  return 0;
}
async function loadWorkingEntries(){
  const saved = await loadEntriesForDate(CURRENT_DATE);
  ENTRIES = {};
  for(const item of ITEMS){
    const s = saved[item.id];
    if(s){
      ENTRIES[item.id] = {...s, saved:true};
    } else {
      const carry = await findCarryOver(item.id, CURRENT_DATE);
      ENTRIES[item.id] = {key:CURRENT_DATE+'::'+item.id, date:CURRENT_DATE, itemId:item.id,
        carryOver:carry, added:0, delivery:0, bar:0, remaining:carry, note:'', saved:false};
    }
  }
}
async function saveEntry(itemId){
  const e = ENTRIES[itemId];
  e.remaining = calcRemaining(e);
  e.date = CURRENT_DATE; e.key = CURRENT_DATE+'::'+itemId; e.itemId = itemId;
  const toSave = {...e, saved:undefined};
  await idbPut('entries', toSave);
  await cloudPutEntry(toSave);
  e.saved = true;
  entryCache[CURRENT_DATE] = entryCache[CURRENT_DATE] || {};
  entryCache[CURRENT_DATE][itemId] = e;
  ENTRY_DATE_SET.add(CURRENT_DATE);
}
async function saveAllVisible(itemIds){
  for(const id of itemIds) await saveEntry(id);
}
async function clearDayEntries(itemIds){
  itemIds.forEach(id=>{
    const e = ENTRIES[id];
    if(!e) return;
    e.added = 0; e.delivery = 0; e.bar = 0; e.note = '';
    e.remaining = calcRemaining(e);
  });
  await saveAllVisible(itemIds);
}

/* =======================================================================
   CALCULATIONS
======================================================================= */
function calcRemaining(e){ return (Number(e.carryOver)||0) + (Number(e.added)||0) - (Number(e.delivery)||0) - (Number(e.bar)||0); }
function calcUsedToday(e){ return (Number(e.delivery)||0) + (Number(e.bar)||0); }
function statusFor(remaining, reorderPoint){
  const r = Number(reorderPoint)||0;
  if(remaining <= 0) return {emoji:'⛔', text:'หมดสต็อก', cls:'danger'};
  if(remaining <= r) return {emoji:'🔴', text:'สั่งซื้อ', cls:'order'};
  if(remaining <= r*1.5) return {emoji:'🟡', text:'ใกล้สั่ง', cls:'near'};
  return {emoji:'🟢', text:'ปกติ', cls:'ok'};
}
function daysLeft(remaining, avgPerDay){
  if(!avgPerDay || avgPerDay<=0) return '-';
  return Math.floor(Math.max(0, remaining/avgPerDay));
}
function categoryCounts(catId){
  const items = ITEMS.filter(i=>i.category===catId);
  let danger=0, order=0, near=0, ok=0;
  items.forEach(i=>{
    const e = ENTRIES[i.id] || {carryOver:0,added:0,delivery:0,bar:0};
    const rem = calcRemaining(e);
    const s = statusFor(rem, i.reorderPoint);
    if(s.cls==='danger') danger++; else if(s.cls==='order') order++; else if(s.cls==='near') near++; else ok++;
  });
  return {total:items.length, danger, order, near, ok};
}

function renderAlertBanner(main, catId){
  const items = catId ? ITEMS.filter(i=>i.category===catId) : ITEMS;
  const flagged = [];
  items.forEach(i=>{
    const e = ENTRIES[i.id] || {carryOver:0,added:0,delivery:0,bar:0};
    const rem = calcRemaining(e);
    const s = statusFor(rem, i.reorderPoint);
    if(s.cls==='danger' || s.cls==='order') flagged.push({name:i.name, s});
  });
  if(flagged.length===0) return;
  flagged.sort((a,b)=> (a.s.cls==='danger'?0:1) - (b.s.cls==='danger'?0:1));
  const banner = document.createElement('div');
  banner.className = 'alert-banner';
  const shown = flagged.slice(0,8);
  const more = flagged.length - shown.length;
  banner.innerHTML = `<div class="alert-head">⚠️ ต้องสั่งซื้อ / หมดสต็อก ${flagged.length} รายการ</div>
    <div class="alert-list">${shown.map(f=>`${f.s.emoji} <b>${esc(f.name)}</b>`).join(' &nbsp;•&nbsp; ')}${more>0?` &nbsp;•&nbsp; และอีก ${more} รายการ`:''}</div>`;
  main.appendChild(banner);
}

function bindCategorySection(catId){
  const table = document.querySelector(`table.stock-table[data-cat="${catId}"]`);
  const addBtn = document.querySelector(`.add-item-btn[data-addcat="${catId}"]`);
  if(addBtn) addBtn.addEventListener('click', ()=> openItemModal(null, catId));
  if(!table) return;

  table.querySelectorAll('tbody tr').forEach(row=>{
    const id = row.dataset.id;
    const item = ITEMS.find(i=>i.id===id);
    const carryI = row.querySelector('.inp-carry');
    const addedI = row.querySelector('.inp-added');
    const deliveryI = row.querySelector('.inp-delivery');
    const barI = row.querySelector('.inp-bar');
    const noteI = row.querySelector('.inp-note');
    const unitI = row.querySelector('.inp-unit');
    const avgI = row.querySelector('.inp-avg');
    const reorderI = row.querySelector('.inp-reorder');
    const usedCell = row.querySelector('.used-cell');
    const totalCell = row.querySelector('.total-cell');
    const remCell = row.querySelector('.rem-cell');
    const daysCell = row.querySelector('.days-cell');
    const statusCell = row.querySelector('.col-status');

    function markUnsaved(){
      ENTRIES[id].saved = false;
      if(!statusCell.querySelector('.unsaved-dot')){
        statusCell.insertAdjacentHTML('beforeend', '<span class="unsaved-dot" title="ยังไม่บันทึก"></span>');
      }
    }
    function recompute(){
      const e = ENTRIES[id];
      e.carryOver = Number(carryI.value)||0;
      e.added = Number(addedI.value)||0;
      e.delivery = Number(deliveryI.value)||0;
      e.bar = Number(barI.value)||0;
      const total = e.carryOver + e.added;
      const rem = calcRemaining(e);
      const used = calcUsedToday(e);
      usedCell.textContent = used;
      totalCell.textContent = total;
      remCell.textContent = rem;
      daysCell.textContent = daysLeft(rem, item.avgPerDay);
      const s = statusFor(rem, item.reorderPoint);
      statusCell.innerHTML = `<span class="status-badge ${s.cls}">${s.emoji} ${s.text}</span><span class="unsaved-dot" title="ยังไม่บันทึก"></span>`;
      row.className = 'row-' + s.cls;
      e.saved = false;
    }
    [carryI, addedI, deliveryI, barI].forEach(inp => inp.addEventListener('input', recompute));
    noteI.addEventListener('input', ()=>{ ENTRIES[id].note = noteI.value; markUnsaved(); });

    unitI.addEventListener('change', async ()=>{
      item.unit = unitI.value.trim() || item.unit;
      unitI.value = item.unit;
      await persistItem(item);
      showToast('อัปเดตหน่วยแล้ว ✓');
    });
    avgI.addEventListener('change', async ()=>{
      item.avgPerDay = Number(avgI.value)||0;
      await persistItem(item);
      daysCell.textContent = daysLeft(calcRemaining(ENTRIES[id]), item.avgPerDay);
      showToast('อัปเดตค่าเฉลี่ย/วันแล้ว ✓');
    });
    reorderI.addEventListener('change', async ()=>{
      item.reorderPoint = Number(reorderI.value)||0;
      await persistItem(item);
      const rem = calcRemaining(ENTRIES[id]);
      const s = statusFor(rem, item.reorderPoint);
      statusCell.innerHTML = `<span class="status-badge ${s.cls}">${s.emoji} ${s.text}</span>${ENTRIES[id].saved?'':'<span class="unsaved-dot" title="ยังไม่บันทึก"></span>'}`;
      if(APP_VIEW==='category') renderSummary();
      showToast('อัปเดตจุดสั่งซื้อแล้ว ✓');
    });

    row.querySelector('.btn-row-save').addEventListener('click', async ()=>{
      await saveEntry(id);
      statusCell.querySelector('.unsaved-dot')?.remove();
      if(APP_VIEW==='category') renderSummary();
      showToast('บันทึกแล้ว ✓');
    });
    row.querySelector('.btn-row-edit').addEventListener('click', ()=> openItemModal(item, item.category));
    row.querySelector('.btn-row-del').addEventListener('click', ()=> openDeleteItemConfirm(item));
  });
}

async function drawReportCharts(){
  const days = Number(document.getElementById('repRange').value);
  const catId = document.getElementById('repCat').value;
  const dates = [];
  for(let i=days-1;i>=0;i--) dates.push(addDays(CURRENT_DATE, -i));
  document.getElementById('repRangeLabel').textContent =
    days===1 ? `แสดงข้อมูลของวันที่ ${dates[0]}` : `แสดงข้อมูลตั้งแต่วันที่ ${dates[0]} ถึง ${dates[dates.length-1]}`;

  const perDateMap = {};
  for(const d of dates) perDateMap[d] = await loadEntriesForDate(d);

  const items = ITEMS.filter(i=>i.category===catId);
  const usageByItem = items.map(item=>{
    let used = 0;
    dates.forEach(d=>{
      const e = perDateMap[d][item.id];
      if(e){
        const total = (Number(e.carryOver)||0)+(Number(e.added)||0);
        const rem = typeof e.remaining==='number' ? e.remaining : calcRemaining(e);
        used += Math.max(0, total - rem);
      }
    });
    return {name:item.name, used};
  }).sort((a,b)=>b.used-a.used).slice(0,15);

  const trendByDate = dates.map(d=>{
    let sum = 0;
    items.forEach(item=>{
      const e = perDateMap[d][item.id];
      if(e){
        const total = (Number(e.carryOver)||0)+(Number(e.added)||0);
        const rem = typeof e.remaining==='number' ? e.remaining : calcRemaining(e);
        sum += Math.max(0, total - rem);
      }
    });
    return sum;
  });

  const c1 = document.getElementById('usageChart');
  const c2 = document.getElementById('trendChart');
  if(charts.usage) charts.usage.destroy();
  if(charts.trend) charts.trend.destroy();

  if(typeof Chart === 'undefined'){
    document.getElementById('chartTitle').textContent = '⚠️ โหลดไลบรารีกราฟไม่สำเร็จ (ตรวจการเชื่อมต่ออินเทอร์เน็ต) — ดูตารางรายละเอียดด้านล่างแทนได้';
  } else {
    charts.usage = new Chart(c1, {
      type:'bar',
      data:{ labels: usageByItem.map(u=>u.name), datasets:[{ label:'ใช้ไป', data: usageByItem.map(u=>u.used), backgroundColor:'#C81E1E' }] },
      options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{legend:{display:false}} }
    });
    charts.trend = new Chart(c2, {
      type:'line',
      data:{ labels: dates.map(d=>d.slice(5)), datasets:[{ label:'ใช้รวม/วัน', data: trendByDate, borderColor:'#141414', backgroundColor:'rgba(200,30,30,0.15)', fill:true, tension:0.3 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
    });
  }

  // Per-date / per-item detail table
  const detailRows = [];
  dates.slice().reverse().forEach(d=>{
    items.forEach(item=>{
      const e = perDateMap[d][item.id];
      if(e){
        const total = (Number(e.carryOver)||0)+(Number(e.added)||0);
        const rem = typeof e.remaining==='number' ? e.remaining : calcRemaining(e);
        const used = Math.max(0, total - rem);
        detailRows.push({date:d, name:item.name, carry:e.carryOver||0, added:e.added||0, delivery:e.delivery||0, bar:e.bar||0, rem, used});
      }
    });
  });
  const detailWrap = document.getElementById('detailTableWrap');
  if(detailRows.length===0){
    detailWrap.innerHTML = `<div class="empty-state"><div class="big">📭</div><h3>ยังไม่มีข้อมูลบันทึกในช่วงนี้</h3></div>`;
  } else {
    detailWrap.innerHTML = `
      <table class="stock-table" style="min-width:640px;">
        <thead><tr>
          <th>วันที่</th><th class="col-item">รายการ</th><th>สต็อกทั้งหมด</th><th>เพิ่ม</th><th>เดลิเวอรี่</th><th>บาร์</th><th>คงเหลือ</th><th>ใช้ไป</th>
        </tr></thead>
        <tbody>
          ${detailRows.map(r=>`<tr>
            <td class="mono">${r.date}</td><td class="col-item">${esc(r.name)}</td>
            <td>${r.carry}</td><td>${r.added}</td><td>${r.delivery}</td><td>${r.bar}</td>
            <td class="col-rem">${r.rem}</td><td style="font-weight:700;color:var(--amber);">${r.used}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }
}

/* =======================================================================
   HISTORY VIEW — จัดข้อมูลเป็น "โฟลเดอร์" รายเดือน/สัปดาห์
   ---------------------------------------------------------------------
   ข้อมูลดิบยังเก็บอยู่ที่เดียวใน Firestore/IndexedDB เหมือนเดิม (ไม่ซ้ำซ้อน
   ไม่กินพื้นที่เพิ่ม) หน้านี้แค่ "จัดเรียงให้ดูเหมือนโฟลเดอร์" ตามเดือน/สัปดาห์
   แล้วค่อย generate ไฟล์ Excel สดๆ ตอนกดดาวน์โหลดเท่านั้น
======================================================================= */
function getMonthDates(ym){
  const [y,m] = ym.split('-').map(Number);
  const last = new Date(y, m, 0).getDate();
  return Array.from({length:last}, (_,i)=> `${ym}-${String(i+1).padStart(2,'0')}`);
}
function groupIntoWeeks(dates){
  const weeks = [];
  for(let i=0;i<dates.length;i+=7) weeks.push(dates.slice(i,i+7));
  return weeks;
}

function renderHistoryView(){
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="chart-card">
      <div class="modal-actions" style="margin-top:0; align-items:flex-end;">
        <div class="field" style="flex:1; margin-bottom:0;">
          <label>📁 เลือกเดือน (โฟลเดอร์)</label>
          <input type="month" id="histMonth" value="${CURRENT_DATE.slice(0,7)}">
        </div>
        <button class="btn-confirm" id="histMonthExport" style="flex:0 0 auto;">⬇️ Excel ทั้งเดือน</button>
      </div>
      <p class="note-txt" id="histMonthLabel" style="margin-top:8px;"></p>
    </div>
    <div id="histWeeksWrap"></div>
  `;
  document.getElementById('histMonth').addEventListener('change', drawHistoryWeeks);
  document.getElementById('histMonthExport').addEventListener('click', async ()=>{
    const ym = document.getElementById('histMonth').value || CURRENT_DATE.slice(0,7);
    await exportExcel(getMonthDates(ym), 'Month_'+ym);
  });
  drawHistoryWeeks();
}

async function drawHistoryWeeks(){
  const ym = document.getElementById('histMonth').value || CURRENT_DATE.slice(0,7);
  const dates = getMonthDates(ym);
  const weeks = groupIntoWeeks(dates);
  const monthNames = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const [yy,mm] = ym.split('-').map(Number);
  document.getElementById('histMonthLabel').textContent = `📂 โฟลเดอร์: ${monthNames[mm-1]} ${yy+543} — แบ่งเป็น ${weeks.length} สัปดาห์ย่อย`;

  const wrap = document.getElementById('histWeeksWrap');
  wrap.innerHTML = '';
  const weekdayNames = ['อา','จ','อ','พ','พฤ','ศ','ส'];

  for(let wi=0; wi<weeks.length; wi++){
    const weekDates = weeks[wi];
    const block = document.createElement('div');
    block.className = 'chart-card';
    const startLabel = weekDates[0].slice(5);
    const endLabel = weekDates[weekDates.length-1].slice(5);
    block.innerHTML = `<h4 style="display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;">
        <span>🗂 สัปดาห์ที่ ${wi+1} (${startLabel} – ${endLabel})</span>
        <button class="row-btn" data-weekexport="${wi}" title="ดาวน์โหลด Excel สัปดาห์นี้" style="font-size:12.5px; border:1px solid var(--rail); border-radius:8px; padding:6px 10px; font-family:'Kanit',sans-serif;">⬇️ Excel สัปดาห์นี้</button>
      </h4>
      <div class="table-wrap" style="box-shadow:none;">
        <table class="stock-table" style="min-width:0;">
          <thead><tr><th>วันที่</th><th>วัน</th><th>สถานะบันทึก</th><th>จัดการ</th></tr></thead>
          <tbody id="histWeekBody-${wi}"></tbody>
        </table>
      </div>`;
    wrap.appendChild(block);
    block.querySelector(`[data-weekexport="${wi}"]`).addEventListener('click', async ()=>{
      await exportExcel(weekDates, 'Week_'+weekDates[0]);
    });

    const tbody = block.querySelector(`#histWeekBody-${wi}`);
    for(const d of weekDates){
      const hasData = ENTRY_DATE_SET.has(d);
      let count = 0;
      if(hasData){
        const obj = await loadEntriesForDate(d);
        count = Object.keys(obj).length;
      }
      const wd = weekdayNames[new Date(d+'T00:00:00').getDay()];
      const isToday = d === todayStr();
      const row = document.createElement('tr');
      row.innerHTML = `<td class="mono">${d}${isToday?' <span style="color:var(--amber);">(วันนี้)</span>':''}</td><td>${wd}</td>
        <td>${hasData ? `✅ บันทึกแล้ว ${count} รายการ` : '<span style="color:var(--ink-soft);">— ไม่มีข้อมูล —</span>'}</td>
        <td class="col-actions">
          ${hasData ? `<button class="row-btn" data-viewday="${d}" title="ดูรายละเอียดวันนี้">👁 ดู</button><button class="row-btn" data-exportday="${d}" title="ดาวน์โหลด Excel เฉพาะวันนี้">⬇️</button>` : '<span style="color:var(--ink-soft);">-</span>'}
        </td>`;
      tbody.appendChild(row);
    }
    tbody.querySelectorAll('[data-viewday]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        CURRENT_DATE = btn.dataset.viewday;
        EDIT_UNLOCKED = (CURRENT_DATE === todayStr());
        document.getElementById('dateInput').value = CURRENT_DATE;
        await loadWorkingEntries();
        APP_VIEW = 'all';
        render();
      });
    });
    tbody.querySelectorAll('[data-exportday]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const d = btn.dataset.exportday;
        await exportExcel([d], 'Day_'+d);
      });
    });
  }
}

          <label>รูปแบบ</label>

            <label><input type="radio" name="exType" value="day" checked><span>รายวัน</span></label>
            <label><input type="radio" name="exType" value="week"><span>รายสัปดาห์</span></label>
            <label><input type="radio" name="exType" value="month"><span>รายเดือน</span></label>
          </div>
        </div>
        <div class="field" id="exDayField"><label>เลือกวันที่ (ปฏิทิน)</label><input type="date" id="exDate" value="${CURRENT_DATE}"></div>
        <div class="field" id="exWeekField" style="display:none;"><label>เลือกวันเริ่มต้นสัปดาห์</label><input type="date" id="exWeekStart" value="${CURRENT_DATE}"></div>
        <div class="field" id="exMonthField" style="display:none;"><label>เลือกเดือน</label><input type="month" id="exMonth" value="${CURRENT_DATE.slice(0,7)}"></div>
        <p class="note-txt">ไฟล์จะแยกชีตตามหมวดหมู่สินค้า (มีคอลัมน์ "วันที่" ในทุกแถว) พร้อมชีตสรุปรวมทุกหมวด</p>
        <div class="modal-actions">
          <button class="btn-cancel" id="m-cancel">ยกเลิก</button>
          <button class="btn-confirm" id="m-go">ดาวน์โหลด</button>
        </div>
      </div>
    </div>`;
  const close = () => root.innerHTML = '';
  document.getElementById('m-cancel').addEventListener('click', close);
  document.getElementById('ov').addEventListener('click', (e)=>{ if(e.target.id==='ov') close(); });
  root.querySelectorAll('input[name="exType"]').forEach(r=>{
    r.addEventListener('change', ()=>{
      document.getElementById('exDayField').style.display = r.value==='day' && r.checked ? 'block':'none';
      document.getElementById('exWeekField').style.display = r.value==='week' && r.checked ? 'block':'none';
      document.getElementById('exMonthField').style.display = r.value==='month' && r.checked ? 'block':'none';
    });
  });
  document.getElementById('m-go').addEventListener('click', async ()=>{
    const type = root.querySelector('input[name="exType"]:checked').value;
    let dates = [], label = '';
    if(type==='day'){
      const d = document.getElementById('exDate').value || CURRENT_DATE;
      dates = [d]; label = 'Day_' + d;
    } else if(type==='week'){
      const start = document.getElementById('exWeekStart').value || CURRENT_DATE;
      dates = Array.from({length:7}, (_,i)=>addDays(start,i));
      label = 'Week_' + start;
    } else {
      const ym = document.getElementById('exMonth').value || CURRENT_DATE.slice(0,7);
      const [y,m] = ym.split('-').map(Number);
      const last = new Date(y, m, 0).getDate();
      dates = Array.from({length:last}, (_,i)=> `${ym}-${String(i+1).padStart(2,'0')}`);
      label = 'Month_' + ym;
    }
    await exportExcel(dates, label);
    close();
  });
}

async function exportExcel(dates, label){
  const perDate = {};
  for(const d of dates) perDate[d] = await loadEntriesForDate(d);

  const wb = XLSX.utils.book_new();
  const combinedRows = [];

  for(const cat of CATEGORIES){
    const items = ITEMS.filter(i=>i.category===cat.id);
    if(items.length===0) continue;
    const rows = [];
    let rowNo = 0;
    dates.forEach(d=>{
      items.forEach(item=>{
        const e = perDate[d][item.id];
        const carry = e ? (Number(e.carryOver)||0) : 0;
        const added = e ? (Number(e.added)||0) : 0;
        const delivery = e ? (Number(e.delivery)||0) : 0;
        const bar = e ? (Number(e.bar)||0) : 0;
        const total = carry + added;
        const usedToday = delivery + bar;
        const remaining = e ? (typeof e.remaining==='number' ? e.remaining : calcRemaining(e)) : '-';
        const s = e ? statusFor(remaining, item.reorderPoint) : {text:'ไม่มีข้อมูล'};
        rowNo++;
        const row = {
          'ลำดับ': rowNo, 'วันที่': d, 'รายการสินค้า': item.name, 'หน่วย': item.unit,
          'สต็อกทั้งหมด': carry, 'ลงของเพิ่ม': added, 'เดลิเวอรี่': delivery, 'ขึ้นบาร์': bar,
          'รวมใช้ไปวันนี้': usedToday, 'ทั้งหมด': total, 'คงเหลือ': remaining,
          'ใช้เฉลี่ย/วัน': item.avgPerDay, 'จุดสั่งซื้อ': item.reorderPoint, 'สถานะ': s.text,
          'หมายเหตุ': e ? (e.note||'') : ''
        };
        rows.push(row);
        combinedRows.push({...row, 'หมวดหมู่': cat.name});
      });
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const safeName = cat.name.replace(/[\\/*?:\[\]]/g,'').slice(0,28) || cat.id;
    XLSX.utils.book_append_sheet(wb, ws, safeName);
  }
  const combinedReordered = combinedRows.map(r=>{
    const {'หมวดหมู่':catName, 'ลำดับ':no, 'วันที่':d, ...rest} = r;
    return {'ลำดับ':no, 'วันที่':d, 'หมวดหมู่':catName, ...rest};
  });
  const wsAll = XLSX.utils.json_to_sheet(combinedReordered);
  XLSX.utils.book_append_sheet(wb, wsAll, 'รวมทุกหมวด');

  XLSX.writeFile(wb, `StockReport_${label}.xlsx`);
  showToast('ส่งออกไฟล์ Excel สำเร็จ ⬇️');
}

/* =======================================================================
   BACKUP / RESTORE (JSON)
======================================================================= */
function openBackupModal(){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-overlay" id="ov">
      <div class="modal">
        <h2>🗂 สำรอง / กู้คืนข้อมูล</h2>
        <p class="note-txt">ข้อมูลทั้งหมด (หมวดหมู่ สินค้า และประวัติการบันทึกทุกวัน) จะถูกบันทึกเป็นไฟล์ JSON ไฟล์เดียว ใช้สำหรับย้ายข้อมูลไปเครื่องอื่น หรือกู้คืนหากลบข้อมูลเบราว์เซอร์โดยไม่ตั้งใจ</p>
        <div class="modal-actions">
          <button class="btn-cancel" id="m-backup">⬇️ สำรองข้อมูล (Export JSON)</button>
        </div>
        <div class="field" style="margin-top:16px;">
          <label>กู้คืนจากไฟล์ JSON</label>
          <input type="file" id="f-restore" accept="application/json">
        </div>
        <p class="note-txt" style="color:var(--red);">⚠️ การกู้คืนจะเขียนทับข้อมูลปัจจุบันทั้งหมด</p>
        <div class="modal-actions">
          <button class="btn-cancel" id="m-cancel">ปิด</button>
          <button class="btn-confirm danger" id="m-restore">กู้คืนข้อมูล</button>
        </div>
      </div>
    </div>`;
  const close = () => root.innerHTML = '';
  document.getElementById('m-cancel').addEventListener('click', close);
  document.getElementById('ov').addEventListener('click', (e)=>{ if(e.target.id==='ov') close(); });
  document.getElementById('m-backup').addEventListener('click', backupData);
  document.getElementById('m-restore').addEventListener('click', async ()=>{
    const f = document.getElementById('f-restore').files[0];
    if(!f){ alert('กรุณาเลือกไฟล์ JSON'); return; }
    if(!confirm('การกู้คืนจะเขียนทับข้อมูลปัจจุบันทั้งหมด ยืนยันหรือไม่?')) return;
    try{
      const text = await f.text();
      const data = JSON.parse(text);
      await restoreData(data);
      close();
      showToast('กู้คืนข้อมูลสำเร็จ ✓');
      location.reload();
    }catch(err){
      alert('ไฟล์ไม่ถูกต้อง: ' + err.message);
    }
  });
}
async function backupData(){
  const categories = await idbGetAll('categories');
  const items = await idbGetAll('items');
  const entries = await idbGetAll('entries');
  const meta = await idbGetAll('meta');
  const payload = { version:1, exportedAt: new Date().toISOString(), categories, items, entries, meta };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `StockBackup_${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('สำรองข้อมูลสำเร็จ ⬇️');
}
async function restoreData(data){
  await idbClear('categories'); await idbClear('items'); await idbClear('entries'); await idbClear('meta');
  for(const c of (data.categories||[])) await idbPut('categories', c);
  for(const i of (data.items||[])) await idbPut('items', i);
  for(const e of (data.entries||[])) await idbPut('entries', e);
  for(const m of (data.meta||[])) await idbPut('meta', m);
  if(CLOUD_ENABLED){
    for(const c of (data.categories||[])) await cloudPutCategory(c);
    for(const i of (data.items||[])) await cloudPutItem(i);
    for(const e of (data.entries||[])) await cloudPutEntry(e);
  }
}

/* =======================================================================
   THEME
======================================================================= */
async function loadTheme(){
  const m = await idbGet('meta', 'theme');
  THEME = m ? m.value : 'dark';
  document.documentElement.setAttribute('data-theme', THEME);
}
async function toggleTheme(){
  THEME = THEME==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', THEME);
  await idbPut('meta', {key:'theme', value:THEME});
}

/* =======================================================================
   INIT
======================================================================= */
async function initApp(){
  DB = await idbOpen();
  await loadTheme();
  await loadAllCategories();
  await loadAllItems();
  await loadAllEntryDates();
  await initCloudSync(); // no-op / offline mode until FIREBASE_CONFIG is filled in

  const dInput = document.getElementById('dateInput');
  dInput.value = CURRENT_DATE;
  async function changeDate(newDate){
    CURRENT_DATE = newDate;
    EDIT_UNLOCKED = (newDate === todayStr());
    dInput.value = CURRENT_DATE;
    await loadWorkingEntries();
    render();
  }
  dInput.addEventListener('change', ()=> changeDate(dInput.value || todayStr()));
  document.getElementById('datePrev').addEventListener('click', ()=> changeDate(addDays(CURRENT_DATE,-1)));
  document.getElementById('dateNext').addEventListener('click', ()=> changeDate(addDays(CURRENT_DATE,1)));

  document.getElementById('searchInput').addEventListener('input', (e)=>{
    SEARCH_Q = e.target.value;
    if(APP_VIEW==='category') renderSingleCategoryView();
    else if(APP_VIEW==='all') renderAllView();
  });

  document.getElementById('saveAllBtn').addEventListener('click', async ()=>{
    if(isPastDateLocked()){ showToast('🔒 ข้อมูลถูกล็อกอยู่ — กดปุ่ม "แก้ไข" ก่อนบันทึก'); return; }
    let ids;
    if(APP_VIEW==='all') ids = ITEMS.map(i=>i.id);
    else ids = ITEMS.filter(i=>i.category===CURRENT_CATEGORY).map(i=>i.id);
    try{
      await saveAllVisible(ids);
      showToast(`บันทึกแล้ว (${ids.length} รายการ) ✓`);
      render();
    }catch(err){
      console.error('Save failed:', err);
      showToast('❌ บันทึกไม่สำเร็จ: ' + (err && err.message ? err.message : 'unknown error'));
    }
  });
  document.getElementById('exportBtn').addEventListener('click', openExportModal);
  document.getElementById('reportBtn').addEventListener('click', ()=>{ APP_VIEW='report'; render(); });
  document.getElementById('homeBtn').addEventListener('click', ()=>{ APP_VIEW='home'; render(); });
  document.getElementById('themeBtn').addEventListener('click', async ()=>{ await toggleTheme(); });
  document.getElementById('backupBtn').addEventListener('click', openBackupModal);
  document.getElementById('startAllBtn').addEventListener('click', ()=>{ APP_VIEW='all'; render(); });
  document.getElementById('clearDayBtn').addEventListener('click', openClearDayConfirm);
  document.getElementById('loginSubmit').addEventListener('click', attemptLogin);
  document.getElementById('loginPassword').addEventListener('keydown', (e)=>{ if(e.key==='Enter') attemptLogin(); });
  document.getElementById('logoutBtn').addEventListener('click', async ()=>{
    if(window.__auth && fauth) await window.__auth.signOut(fauth);
    showToast('ออกจากระบบแล้ว');
  });

  await loadWorkingEntries();
  render();
}

window.addEventListener('DOMContentLoaded', initApp);
</script>
